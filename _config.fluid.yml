#---------------------------
# Hexo Theme Fluid — 淡蓝色定制配置
# 文档：https://hexo.fluid-dev.com/docs/
#---------------------------

# 全局颜色变量（通过自定义 CSS 注入）
custom_css:
  - /css/custom-blue.css

# ===================== 导航栏 =====================
navbar:
  # 博客名称
  blog_title: "codejiaoer's Blog"
  # 导航菜单
  menu:
    - { key: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "归档", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "标签", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

# ===================== 首页 =====================
index:
  # 首页 Banner（纯色淡蓝，不依赖外部图片）
  banner_img: ""
  banner_img_height: 60
  banner_mask_alpha: 0
  # 副标题 / 打字机效果
  slogan:
    enable: true
    text: "专注后端开发与系统架构，分享技术实践与学习笔记"
  # 文章排序
  post_default_img: ""
  post_sticky_enabled: false

# ===================== 文章页 =====================
post:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0
  # 文章元信息
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "YYYY-MM-DD"
    wordcount:
      enable: true
      format: "{} 字"
    min2read:
      enable: true
      format: "{} 分钟"
    views:
      enable: false
  # 文章目录（TOC）
  toc:
    enable: true
    headingSelector: "h1,h2,h3,h4"
    collapseDepth: 0
  # 代码高亮
  highlight:
    enable: true
    lib: "highlightjs"
    highlightjs:
      style: "github"   # 淡色系代码配色
      bg: "#f6f8fa"
    copy_btn: true
  # 版权声明
  copyright:
    enable: true
    content: '本文采用 <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a> 许可协议，转载请注明出处。'

# ===================== 归档页 =====================
archive:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0

# ===================== 分类页 =====================
category:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0

# ===================== 标签页 =====================
tag:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0
  tagcloud:
    min_font: 14
    max_font: 24
    unit: px
    start_color: "#5B9BD5"
    end_color: "#2E75B6"

# ===================== 关于页 =====================
about:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0
  avatar: ""
  name: "codejiaoer"
  intro: "专注后端开发与系统架构的技术博主，分享实践经验与学习笔记。"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/codejiaoer", tip: "GitHub" }

# ===================== 友链页 =====================
links:
  banner_img: ""
  banner_img_height: 45
  banner_mask_alpha: 0

# ===================== 页脚 =====================
footer:
  statistics:
    enable: false
  beian:
    enable: false

# ===================== 全局特效 =====================
# 背景网格动效（关闭以保持清爽）
web_analytics:
  enable: false

# 加载动画
loading_bar: true

# 返回顶部
scroll_top_button:
  enable: true
